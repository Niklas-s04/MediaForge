name: Playwright E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: apps/frontend
        run: |
          npm ci

      - name: Install Playwright browsers
        working-directory: apps/frontend
        run: |
          npx playwright install --with-deps

      - name: Typecheck and build frontend
        working-directory: apps/frontend
        run: |
          npm run check

      - name: Start frontend devserver and run Playwright
        working-directory: apps/frontend
        env:
          CI: true
          FRONTEND_PORT: 5173
        run: |
          npm run preview -- --port 5173 --strictPort > preview.log 2>&1 &
          npx wait-on http://localhost:5173 --timeout 180000
          npx playwright test --config=playwright.ci.config.js --reporter=html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/frontend/playwright-report

services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: nas_convert_api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8787}:8787"
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////data/db.sqlite3}
      - DATA_LOG_DIR=${DATA_LOG_DIR:-/data/logs}
      - DATA_UPLOAD_DIR=${DATA_UPLOAD_DIR:-/data/uploads}
      - DATA_OUTPUT_DIR=${DATA_OUTPUT_DIR:-/data/output}
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-2147483648}
      - OUTPUT_RETENTION_HOURS=${OUTPUT_RETENTION_HOURS:-24}
      - OUTPUT_CLEANUP_INTERVAL_SECONDS=${OUTPUT_CLEANUP_INTERVAL_SECONDS:-3600}
    volumes:
      - ../data:/data
    depends_on:
      - redis

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    container_name: nas_convert_worker
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////data/db.sqlite3}
      - DATA_LOG_DIR=${DATA_LOG_DIR:-/data/logs}
      - DATA_UPLOAD_DIR=${DATA_UPLOAD_DIR:-/data/uploads}
      - DATA_OUTPUT_DIR=${DATA_OUTPUT_DIR:-/data/output}
    command: ["celery", "-A", "apps.worker.worker:celery_app", "worker", "--loglevel=info", "--concurrency=${WORKER_CONCURRENCY:-2}"]
    volumes:
      - ../data:/data
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: nas_convert_redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  redis-data:
